name: Tekivex Issue Report
description: Report a bug, problem, or product issue
title: "[Issue]: "
labels: ["needs-triage"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - GridStorm
        - Analytics Studio
        - PDF Toolkit
        - DataFlow
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 1.0.0

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: e.g. Chrome / Windows / React / Node

  - type: textarea
    id: issue
    attributes:
      label: What issue are you facing?
      placeholder: Explain the problem clearly
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Error appears ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs / console errors
      render: shell
